spring.application.name=influencer-backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/influencer_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# RapidAPI configuration for Instagram Data
rapidapi.instagram.key=${RAPIDAPI_INSTAGRAM_KEY:}

# Chat upload limits (needed for video/document attachments)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
