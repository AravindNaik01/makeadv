services:
  - type: web
    name: influencer-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    env:
      - key: JAVA_OPTS
        value: -Dserver.port=8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    envs:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
